server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: myproject-backend
  datasource:
    url: jdbc:mysql://localhost:3306/myproject?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

jwt:
  secret: my-project-secret-key-for-jwt-must-be-at-least-256-bits-long
  expiration: 86400000

# 文件上传配置
file:
  upload-path: D:/myproject-uploads
  max-size: 104857600  # 100MB

# AI 配置
ai:
  dashscope:
    api-key: sk-7797a9920df04d87b8dc65ff5cc45d6e
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1

logging:
  level:
    com.example.demo: DEBUG
